<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inzeedo License Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .status-pill { padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .status-active { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-revoked { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
        <div class="glass p-8 rounded-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold mb-2 bg-gradient-to-r from-emerald-400 to-blue-500 bg-clip-text text-transparent">Inzeedo Admin</h1>
            <p class="text-slate-400 mb-8">Access the License Management Control</p>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 outline-none focus:border-emerald-500">
                <input type="password" id="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 outline-none focus:border-emerald-500">
                <button onclick="login()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-lg transition-all">Login Securely</button>
            </div>
            <p id="login-error" class="text-red-400 mt-4 text-sm hidden">Invalid Credentials</p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="hidden">
        <nav class="glass sticky top-0 z-40 px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                    <i class="fas fa-shield-halved text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">License Manager</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="admin-user" class="text-sm text-slate-400"></span>
                <button onclick="logout()" class="text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition-all">Logout</button>
            </div>
        </nav>

        <main class="p-8 max-w-7xl mx-auto space-y-8">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-400 text-sm">Total Licenses</p>
                    <h2 id="stat-total" class="text-4xl font-bold mt-1">0</h2>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-400 text-sm">Active Users</p>
                    <h2 id="stat-active" class="text-4xl font-bold mt-1 text-emerald-400">0</h2>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <p class="text-slate-400 text-sm">Pending Activation</p>
                    <h2 id="stat-pending" class="text-4xl font-bold mt-1 text-amber-400">0</h2>
                </div>
            </div>

            <!-- Actions -->
            <div class="glass p-6 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-6">
                <div>
                    <h3 class="text-lg font-bold">Generate New Keys</h3>
                    <p class="text-slate-400 text-sm">Create batch license keys for customers</p>
                </div>
                <div class="flex gap-3 w-full md:w-auto">
                    <input type="number" id="gen-count" value="1" min="1" class="w-20 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 outline-none">
                    <input type="email" id="gen-email" placeholder="Customer Email" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 outline-none">
                    <button onclick="generateKeys()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-6 py-2 rounded-lg transition-all">Generate</button>
                </div>
            </div>

            <!-- Table -->
            <div class="glass rounded-2xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50">
                        <tr>
                            <th class="p-4 text-xs uppercase text-slate-400">License Key</th>
                            <th class="p-4 text-xs uppercase text-slate-400">Customer</th>
                            <th class="p-4 text-xs uppercase text-slate-400">Hardware ID</th>
                            <th class="p-4 text-xs uppercase text-slate-400">Status</th>
                            <th class="p-4 text-xs uppercase text-slate-400">Expires</th>
                            <th class="p-4 text-xs uppercase text-slate-400 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="license-table" class="divide-y divide-slate-700/50">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let token = localStorage.getItem('admin_token');
        
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('admin_token', token);
                    initDashboard();
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch (err) { alert('Server connection failed'); }
        }

        function logout() {
            localStorage.removeItem('admin_token');
            location.reload();
        }

        async function initDashboard() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadLicenses();
        }

        async function loadLicenses() {
            try {
                const res = await fetch('/admin/list', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) return logout();
                const data = await res.json();
                
                if (data.success) {
                    renderTable(data.licenses);
                    updateStats(data.licenses);
                }
            } catch (err) { console.error(err); }
        }

        function renderTable(licenses) {
            const tbody = document.getElementById('license-table');
            tbody.innerHTML = licenses.map(l => `
                <tr class="hover:bg-slate-800/30 transition-all">
                    <td class="p-4 font-mono font-bold text-emerald-400">${l.key}</td>
                    <td class="p-4 text-sm">${l.customerEmail}</td>
                    <td class="p-4 text-xs font-mono text-slate-400">${l.hwid || '---'}</td>
                    <td class="p-4"><span class="status-pill status-${l.status}">${l.status}</span></td>
                    <td class="p-4 text-sm">${new Date(l.expiry).toLocaleDateString()}</td>
                    <td class="p-4 text-right space-x-2">
                        ${l.hwid ? `<button onclick="resetHWID('${l.key}')" title="Reset Hardware" class="p-2 hover:text-amber-400"><i class="fas fa-undo"></i></button>` : ''}
                        <button class="p-2 hover:text-red-400"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(licenses) {
            document.getElementById('stat-total').innerText = licenses.length;
            document.getElementById('stat-active').innerText = licenses.filter(l => l.status === 'active').length;
            document.getElementById('stat-pending').innerText = licenses.filter(l => l.status === 'pending').length;
        }

        async function generateKeys() {
            const count = document.getElementById('gen-count').value;
            const email = document.getElementById('gen-email').value;
            if (!email) return alert('Email required');

            const res = await fetch('/admin/generate', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ count, email, planType: 'Pro', expiryMonths: 12 })
            });
            const data = await res.json();
            if (data.success) loadLicenses();
        }

        async function resetHWID(key) {
            if (!confirm(`Reset Hardware Lock for ${key}?`)) return;
            const res = await fetch('/admin/reset', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` 
                },
                body: JSON.stringify({ licenseKey: key })
            });
            if (res.ok) loadLicenses();
        }

        if (token) initDashboard();
    </script>
</body>
</html>
